name: Selenium ExtentReport CI

on: 
  push:
    branches: 
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        # Tetap jalankan headless di Java code seperti sebelumnya
        run: mvn clean test

      - name: Upload Extent Report
        if: always() # Pastikan report diupload meski ada test yang gagal
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Test-Report
          path: target/extent-report/extent-report.html